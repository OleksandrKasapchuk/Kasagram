{% extends 'base.html' %}
{% load static %}
{% block title %}Chat{% endblock %}

{% block content %}
{% load static %}
<article class="chat-container d-flex flex-column">
    <section class="p-3 mb-1 border-bottom border-secondary">
        <a href="{% url 'user-info' participant.pk %}"><img
                {% if participant.avatar %}
                src="{{ participant.avatar.url }}"
                {% else %}
                src="{% static 'images/default_avatar.jpg' %}"
                {% endif %}
                class="profile-avatar" style="width: 36px;height: 36px;"></a>
        <a href="{% url 'user-info' participant.pk %}" class="h2">{{ participant.username }}</a>
    </section>

    <section id="chat-messages" class="d-flex flex-column">
        {% for message in chat.messages.all %}
            <article class="d-flex mx-3 {% if request.user == message.user %}flex-row-reverse{% endif %}" id="message-{{ message.pk }}">
                <p class="message mb-1 px-3 py-2 d-flex flex-wrap {% if request.user == message.user %}bg-info{% endif %}">
                    {{ message.content }}
                </p>
                {% if request.user == message.user %}
                    <span onclick="deleteMessage({{message.pk}})" class="material-symbols-outlined pointer p-2 delete-btn">delete</span>
                {% endif %}
            </article>
        {% endfor %}
    </section>
    <section class="msg-input d-flex m-2">
        <textarea id="message-content" placeholder="Type a message..."></textarea>
        <span class="material-symbols-outlined pointer p-3 pt-2" onclick="SendMessage()">Send</span>
    </section>
</article>

<script>
    function SendMessage() {
        const content = document.getElementById('message-content').value.trim();
        if (content === '') {
            alert('Please enter a message.');
            return;
        }

        const formData = new FormData();
        formData.append('content', content);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        fetch("{% url 'chat:chat_detail' chat.pk %}", {
            method: 'POST',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
            },
            body: formData
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data.success) {
                const chatMessages = document.getElementById('chat-messages');
                const newMessage = document.createElement('article');
                newMessage.classList.add('d-flex', 'mx-3', 'flex-row-reverse');
                newMessage.id = `message-${data.message_id}`;
                newMessage.innerHTML = `
                    <img src="${data.avatar_url}" style="border-radius: 30px;width: 36px;height: 36px;">
                    <p class="message d-flex bg-info">
                        ${data.content}
                    </p>
                    <a href="javascript:void(0);" class="p-3 delete-btn" onclick="deleteMessage(${data.message_id})"><span class="material-symbols-outlined pointer">delete</span></a>
                `;
                chatMessages.appendChild(newMessage);
                document.getElementById('message-content').value = '';
            } else {
                alert('Error sending message: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(error => console.error('Error:', error));
    };

    function deleteMessage(messageId) {
    if (!confirm('Are you sure you want to delete this message?')) {
        return;
    }

    fetch(`{% url 'chat:delete_message' 0 %}`.replace('0', messageId), {
        method: 'DELETE',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById(`message-${messageId}`).remove();
        } else {
            alert('Error deleting message: ' + (data.error || 'Unknown error'));
        }
    })
    .catch(error => console.error('Error:', error));
}


    function fetchMessages() {
        const chatMessages = document.getElementById('chat-messages');
        fetch("{% url 'chat:get_messages' chat.pk %}", {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
            },
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            chatMessages.innerHTML = '';
            data.messages.forEach(message => {
                const newMessage = document.createElement('article');
                newMessage.classList.add('d-flex', 'mx-3');
                newMessage.id = `message-${message.id}`;
                if (message.is_user_message) {
                    newMessage.classList.add('flex-row-reverse');
                }
                newMessage.innerHTML = `
                    <p class="message d-flex px-3 py-2 ${message.is_user_message ? 'bg-info' : ''}">
                        ${message.content}
                    </p>
                    ${message.is_user_message ? `  <span onclick="deleteMessage(${message.id})" class="material-symbols-outlined pointer p-3 delete-btn">delete</span>` : ''}
                `;
                chatMessages.appendChild(newMessage);
            });
        })
        .catch(error => console.error('Error:', error));
    }
    // Fetch messages every 5 seconds
    setInterval(fetchMessages, 5000);

    // Initial fetch
    fetchMessages();
</script>
{% endblock %}
